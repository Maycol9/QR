<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #08111f, #111b33, #1b2340);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .moon {
      position: absolute;
      top: 60px;
      right: 80px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff7cc, #f0e6a6 60%, #d6cc8c);
      box-shadow: 0 0 30px rgba(255, 245, 180, 0.6);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 700px;
      padding: 35px 25px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .title {
      font-size: 2.1rem;
      margin-bottom: 18px;
      color: #ffd9e8;
      text-shadow: 0 0 10px rgba(255, 192, 203, 0.4);
    }

    .line {
      font-size: 1.3rem;
      margin: 14px 0;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
      color: #fff8fc;
    }

    .line.show {
      opacity: 1;
      transform: translateY(0);
    }

    .heart-btn,
    .option-btn,
    .restart-btn {
      border: none;
      cursor: pointer;
      transition: 0.3s ease;
      font-weight: bold;
    }

    .heart-btn {
      margin-top: 28px;
      background: linear-gradient(135deg, #ff5e9c, #ff8fb1);
      color: white;
      padding: 16px 28px;
      font-size: 1.05rem;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(255, 94, 156, 0.35);
    }

    .heart-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 10px 24px rgba(255, 94, 156, 0.5);
    }

    .hidden {
      display: none;
    }

    .question-box {
      margin-top: 20px;
      animation: fadeIn 1s ease;
    }

    .question {
      font-size: 1.7rem;
      margin-bottom: 20px;
      color: #ffd6e7;
    }

    .options {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .option-btn {
      padding: 14px 22px;
      border-radius: 16px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .option-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
    }

    .final-box {
      margin-top: 15px;
      animation: fadeIn 1s ease;
    }

    .final-message {
      font-size: 1.4rem;
      line-height: 1.8;
      color: #fff0f6;
      margin-top: 15px;
    }

    .kiss {
      font-size: 3rem;
      margin: 15px 0;
      animation: pulse 1.2s infinite;
    }

    .restart-btn {
      margin-top: 22px;
      padding: 12px 22px;
      border-radius: 14px;
      background: #ff7ca8;
      color: white;
      font-size: 1rem;
    }

    .restart-btn:hover {
      transform: scale(1.05);
      background: #ff5f96;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 2.5s infinite ease-in-out;
      z-index: 0;
    }

    .heart-float {
      position: absolute;
      bottom: -20px;
      font-size: 18px;
      color: rgba(255, 170, 200, 0.75);
      animation: floatUp linear infinite;
      z-index: 1;
      user-select: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .title {
        font-size: 1.7rem;
      }

      .line {
        font-size: 1.1rem;
      }

      .question {
        font-size: 1.4rem;
      }

      .final-message {
        font-size: 1.2rem;
      }

      .moon {
        width: 65px;
        height: 65px;
        top: 35px;
        right: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="moon"></div>

  <div class="container">
    <h1 class="title">✨ Para ti ✨</h1>

    <div id="story">
      <p class="line" id="line1">Hola, linda…</p>
      <p class="line" id="line2">Quería decirte algo de una forma bonita…</p>
      <p class="line" id="line3">Me pareces una chica muy linda y me gustas.</p>

      <button class="heart-btn hidden" id="continueBtn">💖 Sigue leyendo</button>
    </div>

    <div class="question-box hidden" id="questionBox">
      <p class="question">¿Te puedo gustar un poquito?</p>
      <div class="options">
        <button class="option-btn" onclick="showFinal()">Sí, un poquito</button>
        <button class="option-btn" onclick="showFinal()">Tal vez</button>
      </div>
    </div>

    <div class="final-box hidden" id="finalBox">
      <div class="kiss">💌</div>
      <p class="final-message">
        Solo quería que supieras que me gustas y que tienes algo muy especial.
      </p>
      <button class="restart-btn" onclick="restartStory()">Volver a ver</button>
    </div>
  </div>

  <script>
    const lines = [
      document.getElementById("line1"),
      document.getElementById("line2"),
      document.getElementById("line3")
    ];

    const continueBtn = document.getElementById("continueBtn");
    const story = document.getElementById("story");
    const questionBox = document.getElementById("questionBox");
    const finalBox = document.getElementById("finalBox");

    function showLines() {
      lines.forEach((line, index) => {
        setTimeout(() => {
          line.classList.add("show");
        }, index * 1300);
      });

      setTimeout(() => {
        continueBtn.classList.remove("hidden");
      }, 4200);
    }

    function goToQuestion() {
      story.classList.add("hidden");
      questionBox.classList.remove("hidden");
    }

    function showFinal() {
      questionBox.classList.add("hidden");
      finalBox.classList.remove("hidden");
    }

    function restartStory() {
      finalBox.classList.add("hidden");
      questionBox.classList.add("hidden");
      story.classList.remove("hidden");

      lines.forEach(line => line.classList.remove("show"));
      continueBtn.classList.add("hidden");

      setTimeout(showLines, 300);
    }

    continueBtn.addEventListener("click", goToQuestion);

    function createStars() {
      for (let i = 0; i < 80; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        star.style.animationDelay = Math.random() * 3 + "s";
        star.style.animationDuration = (1.5 + Math.random() * 3) + "s";
        document.body.appendChild(star);
      }
    }

    function createFloatingHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart-float");
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (14 + Math.random() * 20) + "px";
        heart.style.animationDuration = (5 + Math.random() * 5) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 10000);
      }, 500);
    }

    createStars();
    createFloatingHearts();
    showLines();
  </script>
</body>
</html>
