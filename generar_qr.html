<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de QR</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ffd3e2, #ff9ec4);
      color: #5b1233;
    }
    .box {
      width: min(92vw, 580px);
      background: rgba(255,255,255,0.92);
      padding: 26px;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.15);
    }
    h1 { margin-top: 0; }
    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 14px;
      border: 1px solid #e5a8c1;
      outline: none;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      border: none;
      background: #ff4f91;
      color: white;
      padding: 14px;
      font-size: 16px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: bold;
    }
    .result {
      margin-top: 22px;
      text-align: center;
    }
    img {
      max-width: 280px;
      width: 100%;
      border-radius: 20px;
      background: white;
      padding: 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }
    .note {
      font-size: 14px;
      line-height: 1.6;
      margin-top: 10px;
    }
    code {
      background: #fff0f6;
      padding: 2px 6px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Generador de QR para tu proyecto 💖</h1>
    <p>Pega aquí el enlace público de <code>index.html</code> una vez que lo subas a GitHub Pages, Netlify o Render.</p>
    <input type="url" id="urlInput" placeholder="https://tusitio.com/index.html" />
    <button id="generateBtn">Generar QR</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById('generateBtn').addEventListener('click', () => {
      const url = document.getElementById('urlInput').value.trim();
      const result = document.getElementById('result');

      if (!url) {
        result.innerHTML = '<p>Primero pega un enlace válido.</p>';
        return;
      }

      const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(url);
      result.innerHTML = `
        <p><strong>Tu QR está listo:</strong></p>
        <img src="${qrUrl}" alt="Código QR" />
        <p class="note">Escanea este código con tu teléfono y se abrirá tu página romántica.</p>
      `;
    });
  </script>
</body>
</html>
